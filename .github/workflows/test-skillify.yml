name: test-skillify

# Python test gate for the `skillify` skill (skills/skillify/). Path-filtered so
# it runs ONLY when skills/skillify/** changes — the monorepo's tests-optional
# default (lint-skill-md.yml) stands everywhere else. Recovers the CI coverage
# the standalone broomva/skillify repo had, since `bstack skills graduate` drops
# the per-skill .github/ dir on migration (see research/entities/tool/skills-sh.md).

on:
  pull_request:
    paths:
      - 'skills/skillify/**'
      - '.github/workflows/test-skillify.yml'
  push:
    branches: [main]
    paths:
      - 'skills/skillify/**'
      - '.github/workflows/test-skillify.yml'
  workflow_dispatch:

concurrency:
  group: test-skillify-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: skills/skillify

jobs:
  test:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dev deps
        run: pip install -r tests/requirements-dev.txt
      - name: Tests
        run: python -m pytest tests/ -v
      - name: Dogfood — skillify passes its own gate (executes tests, syntax-checks scripts)
        run: python3 scripts/skillify_check.py . --run-tests
