name: tradingview-bridge tests

on:
  push:
    branches: [main]
    paths:
      - "skills/finance/investment-management/services/tradingview-bridge/**"
      - ".github/workflows/tradingview-bridge.yml"
  pull_request:
    paths:
      - "skills/finance/investment-management/services/tradingview-bridge/**"
      - ".github/workflows/tradingview-bridge.yml"

defaults:
  run:
    working-directory: skills/finance/investment-management/services/tradingview-bridge

jobs:
  lint-and-test:
    name: lint + type-check + test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      TVBRIDGE_TRADING_MODE: paper
      TVBRIDGE_TV_WEBHOOK_SECRET: test-secret-do-not-use-in-prod-or-anywhere-real

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (type check)
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -v --tb=short
