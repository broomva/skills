name: test-kg

# Python test gate for the `kg` skill (skills/kg/). Path-filtered so it runs ONLY
# when skills/kg/** changes. Recovers the CI coverage the standalone broomva/kg
# repo had, since migration drops the per-skill .github/ dir
# (see research/entities/tool/skills-sh.md).

on:
  pull_request:
    paths:
      - 'skills/kg/**'
      - '.github/workflows/test-kg.yml'
  push:
    branches: [main]
    paths:
      - 'skills/kg/**'
      - '.github/workflows/test-kg.yml'
  workflow_dispatch:

concurrency:
  group: test-kg-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: skills/kg

jobs:
  test:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install pytest
        run: pip install pytest
      - name: Tests
        run: python -m pytest scripts/test_kg.py -v
