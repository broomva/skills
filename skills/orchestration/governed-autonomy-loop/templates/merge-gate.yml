# merge-gate.yml — the server-side aggregate gate behind autonomous merges.
#
# THE POINT: autonomous merge is only safe with an ALWAYS-RUNS aggregate check
# required by a branch ruleset. Requiring the individual CI jobs is a footgun —
# a path-filtered CI (paths-ignore: docs/**, **/*.md) SKIPS on a docs-only PR, and
# GitHub leaves a skipped-but-required check "Expected" forever, blocking the PR.
# This job runs on EVERY PR (no filter) and passes iff every OTHER check-run on
# the head SHA concluded without a hard failure — always reported, tolerant of
# skipped/path-filtered checks. It is the one thing the ruleset requires, and the
# server-side backstop behind the loop's autonomous merge: an arc can merge its own
# PR only once this is green (= the full suite that actually ran, passed).
#
# Native `gh api` only — no third-party actions on the merge-critical path
# (supply-chain hygiene). Copy into .github/workflows/ and require "Merge Gate" in
# the branch ruleset (see references/server-side-net.md for the ruleset recipe).
name: merge-gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: merge-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: read
  statuses: read

jobs:
  gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Require all other checks green (or skipped)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Conclusions that BLOCK a merge. success / skipped / neutral do NOT block.
          BLOCKING='failure|cancelled|timed_out|action_required|startup_failure|stale'
          for i in $(seq 1 80); do   # up to ~40 min (slow CI + macOS runners)
            runs=$(gh api --paginate "repos/$REPO/commits/$SHA/check-runs" \
                     --jq '.check_runs[] | select(.name != "Merge Gate") | [.name, .status, (.conclusion // "")] | @tsv' \
                   || echo "")
            st_state=$(gh api "repos/$REPO/commits/$SHA/status" --jq '.state' 2>/dev/null || echo "unknown")

            failed=$(printf '%s\n' "$runs" | awk -F'\t' -v b="$BLOCKING" 'NF>=3 && $3 ~ ("^(" b ")$"){print $1}')
            if [ -n "$failed" ] || [ "$st_state" = "failure" ] || [ "$st_state" = "error" ]; then
              echo "::error::Merge Gate FAILED — blocking checks:"
              [ -n "$failed" ] && printf '  - %s\n' $failed
              [ "$st_state" = "failure" ] || [ "$st_state" = "error" ] && echo "  - (legacy commit status: $st_state)"
              exit 1
            fi

            n=$(printf '%s\n' "$runs" | grep -c . || true)
            incomplete=$(printf '%s\n' "$runs" | awk -F'\t' 'NF>=2 && $2 != "completed"{c++} END{print c+0}')

            if [ "$n" -gt 0 ] && [ "$incomplete" -eq 0 ] && { [ "$st_state" = "success" ] || [ "$st_state" = "pending" ]; }; then
              echo "Merge Gate PASS — $n check(s) completed, none failed (commit status: $st_state)."
              exit 0
            fi
            # No other checks after a short grace = path-filtered/docs-only PR → nothing to gate.
            if [ "$n" -eq 0 ] && [ "$i" -ge 5 ]; then
              echo "Merge Gate PASS — no other checks after grace (CI path-filtered / docs-only)."
              exit 0
            fi
            echo "waiting: $n check(s), $incomplete still running, commit status=$st_state (poll $i/80)…"
            sleep 30
          done
          echo "::error::Merge Gate timed out waiting for checks to conclude."
          exit 1
